name: Book Radar Watch

on:
  schedule:
    - cron: "0 */3 * * *" # Every 3 hours. Collects candidates silently.
  workflow_dispatch:

jobs:
  radar-watch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore radar state cache
        uses: actions/cache@v4
        with:
          path: output/radar
          key: book-radar-state-${{ github.run_id }}
          restore-keys: |
            book-radar-state-

      - name: Restore Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p secrets
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > secrets/google-service-account.json

      - name: Run Book Radar watch
        env:
          BOOK_RADAR_EMAIL_ENABLED: "false"
          BOOK_RADAR_TELEGRAM_ENABLED: "false"
        run: python -m src.main --config config/app.yaml --mode radar --notify-policy silent --output output

      - name: Upload watch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: book-radar-watch-output
          path: |
            output/**/radar_changes.json
            output/**/radar_report.md
            output/**/radar_state_after.json
            output/**/radar_run_summary.json
